<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>UniConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#4f46e5', // Indigo 600
              secondary: '#0ea5e9', // Sky 500
              accent: '#f59e0b', // Amber 500
              dark: '#0f172a', // Slate 900
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Hide scrollbar for horizontal scroll containers */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Safe area padding for mobile devices */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .safe-top {
        padding-top: max(0.75rem, env(safe-area-inset-top));
      }
      /* Prevent message overflow on mobile */
      .message-container {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      /* Prevent horizontal scrolling */
      html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
        position: relative;
      }
      /* Ensure all containers respect viewport */
      * {
        box-sizing: border-box;
      }
      /* Ensure touch targets are at least 44px for interactive elements */
      button:not([class*="p-"]), 
      a:not([class*="p-"]),
      label:not([class*="p-"]) {
        min-height: 44px;
        min-width: 44px;
      }
      /* Safe area bottom for modals */
      .safe-bottom {
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
      }
      /* Better scrolling on mobile */
      * {
        -webkit-overflow-scrolling: touch;
      }
      /* Ensure text wraps properly on mobile */
      p, span, div, h1, h2, h3, h4, h5, h6 {
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      /* Prevent images from overflowing */
      img {
        max-width: 100%;
        height: auto;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0",
    "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.21.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
