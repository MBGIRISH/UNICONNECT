<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <title>UniConnect</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: '#4f46e5', // Indigo 600
              secondary: '#0ea5e9', // Sky 500
              accent: '#f59e0b', // Amber 500
              dark: '#0f172a', // Slate 900
            }
          }
        }
      }
    </script>
    <style>
      /* Mobile-First Responsive Design */
      
      /* Base: Mobile (default) */
      :root {
        --font-size-xs: 0.75rem;    /* 12px */
        --font-size-sm: 0.875rem;   /* 14px */
        --font-size-base: 1rem;     /* 16px */
        --font-size-lg: 1.125rem;    /* 18px */
        --font-size-xl: 1.25rem;     /* 20px */
        --font-size-2xl: 1.5rem;     /* 24px */
        --font-size-3xl: 1.875rem;   /* 30px */
        --spacing-xs: 0.25rem;       /* 4px */
        --spacing-sm: 0.5rem;        /* 8px */
        --spacing-md: 1rem;          /* 16px */
        --spacing-lg: 1.5rem;        /* 24px */
        --spacing-xl: 2rem;          /* 32px */
      }

      /* Tablet: 769px - 1024px */
      @media (min-width: 769px) {
        :root {
          --font-size-xs: 0.8125rem;  /* 13px */
          --font-size-sm: 0.9375rem;  /* 15px */
          --font-size-base: 1rem;     /* 16px */
          --font-size-lg: 1.25rem;     /* 20px */
          --font-size-xl: 1.5rem;     /* 24px */
          --font-size-2xl: 1.875rem;   /* 30px */
          --font-size-3xl: 2.25rem;    /* 36px */
        }
      }

      /* Desktop: 1025px and above */
      @media (min-width: 1025px) {
        :root {
          --font-size-xs: 0.875rem;   /* 14px */
          --font-size-sm: 1rem;       /* 16px */
          --font-size-base: 1.125rem;  /* 18px */
          --font-size-lg: 1.5rem;      /* 24px */
          --font-size-xl: 1.875rem;    /* 30px */
          --font-size-2xl: 2.25rem;    /* 36px */
          --font-size-3xl: 3rem;       /* 48px */
        }
      }

      /* Custom Scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Hide scrollbar for horizontal scroll containers */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Safe area padding for mobile devices */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .safe-top {
        padding-top: max(0.75rem, env(safe-area-inset-top));
      }
      /* Prevent message overflow on mobile */
      .message-container {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      /* Prevent horizontal scrolling */
      html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
        position: relative;
      }
      /* Ensure all containers respect viewport */
      * {
        box-sizing: border-box;
      }
      /* Ensure touch targets are at least 44px for interactive elements */
      button:not([class*="p-"]):not([class*="min-h"]), 
      a:not([class*="p-"]):not([class*="min-h"]),
      label:not([class*="p-"]):not([class*="min-h"]) {
        min-height: 44px;
        min-width: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      /* Safe area bottom for modals */
      .safe-bottom {
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
      }
      /* Better scrolling on mobile */
      * {
        -webkit-overflow-scrolling: touch;
      }
      /* Ensure text wraps properly on mobile */
      p, span, div, h1, h2, h3, h4, h5, h6 {
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      /* Prevent images from overflowing */
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      
      /* Responsive Typography */
      @media (max-width: 768px) {
        h1 { font-size: 1.5rem; line-height: 1.3; }
        h2 { font-size: 1.25rem; line-height: 1.4; }
        h3 { font-size: 1.125rem; line-height: 1.4; }
        p { font-size: 0.875rem; line-height: 1.5; }
      }
      
      @media (min-width: 769px) and (max-width: 1024px) {
        h1 { font-size: 2rem; line-height: 1.3; }
        h2 { font-size: 1.5rem; line-height: 1.4; }
        h3 { font-size: 1.25rem; line-height: 1.4; }
        p { font-size: 1rem; line-height: 1.6; }
      }
      
      @media (min-width: 1025px) {
        h1 { font-size: 2.5rem; line-height: 1.2; }
        h2 { font-size: 2rem; line-height: 1.3; }
        h3 { font-size: 1.5rem; line-height: 1.4; }
        p { font-size: 1.125rem; line-height: 1.6; }
      }
      
      /* Responsive Container Padding */
      .container-responsive {
        padding-left: 1rem;
        padding-right: 1rem;
      }
      
      @media (min-width: 640px) {
        .container-responsive {
          padding-left: 1.5rem;
          padding-right: 1.5rem;
        }
      }
      
      @media (min-width: 1024px) {
        .container-responsive {
          padding-left: 2rem;
          padding-right: 2rem;
        }
      }
      
      /* Touch-friendly spacing */
      @media (max-width: 768px) {
        .touch-spacing > * + * {
          margin-top: 0.75rem;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0",
    "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.21.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
