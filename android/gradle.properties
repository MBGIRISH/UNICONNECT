# Project-wide Gradle settings.
#
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
#
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# JVM arguments for the Gradle daemon (bump heap + set UTF-8)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable AndroidX libraries
android.useAndroidX=true

# === RELEASE SIGNING (REQUIRED FOR PLAY STORE) ===
# Replace the placeholder values below with your actual keystore passwords.
# These values are loaded in android/app/build.gradle.
# ⚠️ Never commit real passwords to git repositories. Update locally.
KEYSTORE_PASSWORD=Reset@17
KEY_PASSWORD=Reset@17

